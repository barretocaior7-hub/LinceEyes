<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthTech - Area Restrita</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h2>🔒 Área Restrita - HealthTech</h2>
    <p id="welcome-msg" class="status-msg success">Bem-vindo ao sistema seguro!</p>

    <div style="margin-top: 2rem;">
      <button id="btn-logout" style="background: #ef4444;">Sair / Encerrar Sessão</button>
    </div>
  </div>

  <script>
    // Verifica se o usuário autenticou via login biométrico ou RH
    const isAuth = localStorage.getItem('user_authenticated');
    const userName = localStorage.getItem('user_name');

    if (!isAuth) {
      // Se não autenticou, volta para a página de login
      window.location.href = '/login.html';
    } else if (userName) {
      document.getElementById('welcome-msg').innerText = `Acesso Autorizado! Bem-vindo(a), ${userName}.`;
    }

    // Botão de Logout
    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('user_authenticated');
      localStorage.removeItem('user_name');
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
